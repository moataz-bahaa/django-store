<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    {% if name %}
    <h1>Hello {{ name }}</h1>
    {% else %}
    <h1>Hello wrold</h1>
    {% endif %}

    <ul>
      {% for order in orders %}
      <li>
        <p>{{ order.id }} <span>{{ order.customer.first_name }}$</span></p>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
